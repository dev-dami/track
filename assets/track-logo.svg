<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="100%" height="100%">
  <!-- Flat background -->
  <rect width="600" height="160" rx="24" fill="#0f172a"/>

  <!-- Flat C-inspired Icon Mark -->
  <g transform="translate(40, 20)">
    <!-- Outer C bracket frame -->
    <path d="M 96 28 L 48 28 C 37.0 28 28 37.0 28 48 L 28 72 C 28 83.0 37.0 92 48 92 L 96 92" 
          fill="none" 
          stroke="#3b82f6" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- T top bar -->
    <line x1="50" y1="46" x2="98" y2="46" 
          stroke="#f8fafc" 
          stroke-width="10" 
          stroke-linecap="round"/>
    
    <!-- T stem -->
    <line x1="74" y1="46" x2="74" y2="84" 
          stroke="#f8fafc" 
          stroke-width="10" 
          stroke-linecap="round"/>
  </g>

  <!-- Wordmark "TRACK" -->
  <text x="175" y="102" 
        font-family="system-ui, -apple-system, sans-serif, monospace" 
        font-size="64" 
        font-weight="800" 
        letter-spacing="6" 
        fill="#f8fafc">TRACK</text>
</svg>
